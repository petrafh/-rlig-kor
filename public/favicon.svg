<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Yellow background like the site -->
  <rect width="100" height="100" rx="16" fill="#fef08a" stroke="#000" stroke-width="5"/>
  <!-- Mic body filled purple, thick black border -->
  <rect x="34" y="10" width="32" height="46" rx="16" fill="#a855f7" stroke="#000" stroke-width="5"/>
  <!-- Mic grille lines -->
  <line x1="34" y1="30" x2="66" y2="30" stroke="#000" stroke-width="3"/>
  <line x1="34" y1="40" x2="66" y2="40" stroke="#000" stroke-width="3"/>
  <!-- Stand arc -->
  <path d="M22 52 Q22 78 50 78 Q78 78 78 52" fill="none" stroke="#000" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Pole -->
  <line x1="50" y1="78" x2="50" y2="91" stroke="#000" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="33" y1="91" x2="67" y2="91" stroke="#000" stroke-width="5.5" stroke-linecap="round"/>
</svg>
